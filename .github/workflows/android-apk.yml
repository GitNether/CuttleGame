name: Build Android APK

# Manually triggered from the Actions tab. Produces an installable release APK
# and uploads it as a workflow artifact you can download and sideload / send to
# a friend. Runs entirely on GitHub's runners — no Expo account, no secrets.
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version label baked into the APK (cosmetic)"
        required: false
        default: "preview"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # React Native 0.79 / Expo SDK 53 require JDK 17.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up the Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # Generate the native android/ project from app.json (managed workflow).
      - name: Prebuild the native Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install

      # A fresh keystore per run is fine for a sideloadable preview build.
      # NOTE: because the signing key changes each run, Android treats each
      # APK as a different signer — to install a newer one over an older one
      # you must uninstall the previous copy first. See the PR description for
      # how to switch to a stable keystore (a single repo secret) if you want
      # in-place updates.
      - name: Generate a signing keystore
        run: |
          KS_PASS="$(openssl rand -hex 16)"
          echo "::add-mask::$KS_PASS"
          echo "KS_PASS=$KS_PASS" >> "$GITHUB_ENV"
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/release.keystore" \
            -alias cuttle -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KS_PASS" -keypass "$KS_PASS" \
            -dname "CN=Cuttle Online, OU=Dev, O=Cuttle, L=NA, ST=NA, C=DE"

      - name: Assemble the release APK
        working-directory: apps/mobile/android
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="$KS_PASS" \
            -Pandroid.injected.signing.key.alias=cuttle \
            -Pandroid.injected.signing.key.password="$KS_PASS"

      - name: Rename the APK
        run: |
          mkdir -p "$RUNNER_TEMP/out"
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
             "$RUNNER_TEMP/out/cuttle-online-${{ inputs.version_name }}.apk"

      - name: Upload the APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuttle-online-apk
          path: ${{ runner.temp }}/out/*.apk
          if-no-files-found: error
          retention-days: 30
